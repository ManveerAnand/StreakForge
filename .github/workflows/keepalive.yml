name: "💓 Keep Alive"

on:
  schedule:
    # 1st of every month at 00:00 UTC
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Bump keepalive timestamp
        run: |
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .keepalive
          git config user.name "StreakForge Bot"
          git config user.email "bot@streakforge.dev"
          git add .keepalive
          git commit -m "keepalive: $(date -u +%Y-%m-%d)"
          git push
